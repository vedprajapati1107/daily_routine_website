<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Daily Routine</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background-color: #ffffff;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        a {
            text-decoration: none;
            color: #2196F3;
            font-weight: bold;
        }

        a:hover {
            color: #0b7dda;
        }
    </style>
</head>

<body>

<h1>My Daily Routine</h1>

<table>
    <tr>
        <th>Time</th>
        <th>Activity</th>
    </tr>

    <tr>
        <td>6:30 AM</td>
        <td>Wake Up</td>
    </tr>

    <tr>
        <td>7:00 AM</td>
        <td>Exercise</td>
    </tr>

    <tr>
        <td>8:00 AM</td>
        <td>Breakfast</td>
    </tr>

    <tr>
        <td>9:00 AM</td>
        <td>
            <a href="college.html">Go to College</a>
        </td>
    </tr>

    <tr>
        <td>2:00 PM</td>
        <td>Lunch</td>
    </tr>

    <tr>
        <td>4:00 PM</td>
        <td>Study / Assignments</td>
    </tr>

    <tr>
        <td>8:00 PM</td>
        <td>Dinner</td>
    </tr>

    <tr>
        <td>10:30 PM</td>
        <td>Sleep</td>
    </tr>

</table>

</body>
</html>
